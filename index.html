
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="blue">
<meta name="apple-mobile-web-app-title" content="Pulse">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Social</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="login-page" class="flex flex-col items-center justify-center h-screen p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl text-center w-full max-w-sm border-t-8 border-blue-600">
            <h1 class="text-5xl font-black text-blue-600 mb-2 italic">Pulse</h1>
            <button onclick="googleLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg mt-6">Google Login</button>
        </div>
    </div>

    <div id="app-page" class="hidden h-screen flex flex-col">
        <nav class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-lg sticky top-0 z-50">
            <span id="nav-title" class="text-xl font-bold">Pulse Social</span>
            <button onclick="logout()" class="text-xs border px-2 py-1 rounded">Logout</button>
        </nav>
        <div id="content-area" class="flex-1 overflow-y-auto pb-24 p-4"></div>
        <div class="fixed bottom-0 w-full bg-white border-t flex justify-around p-4 shadow-inner">
            <button onclick="showFeed()" class="font-bold text-blue-600">🏠 Feed</button>
            <button onclick="showUserList()" class="font-bold">💬 Messages</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB9BvL5xi3I7iTD3W_G_Xer2DOTbMDX95U",
            authDomain: "my-social-media-app-67478.firebaseapp.com",
            projectId: "my-social-media-app-67478",
            storageBucket: "my-social-media-app-67478.firebasestorage.app",
            messagingSenderId: "1078829869667",
            appId: "1:1078829869667:web:90d8767dd0f12f5ff02656"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-page').classList.remove('hidden');
                db.collection("users").doc(user.uid).set({ name: user.displayName, email: user.email });
                showFeed();
            }
        });

        function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); location.reload(); }

        function showFeed() {
            document.getElementById('nav-title').innerText = "Pulse Feed";
            const area = document.getElementById('content-area');
            area.innerHTML = `<div class="bg-white p-4 rounded-xl shadow mb-4"><textarea id="pTxt" class="w-full border p-2 rounded" placeholder="What's happening?"></textarea><button onclick="postFeed()" class="w-full bg-blue-600 text-white mt-2 p-2 rounded">Post</button></div><div id="feedPosts" class="space-y-4"></div>`;
            db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
                const cont = document.getElementById('feedPosts'); if(!cont) return;
                cont.innerHTML = "";
                snap.forEach(doc => { cont.innerHTML += `<div class="bg-white p-4 rounded-xl shadow"><p class="font-bold text-blue-600 text-xs">${doc.data().user}</p><p>${doc.data().text}</p></div>`; });
            });
        }

        function postFeed() {
            const txt = document.getElementById('pTxt').value;
            if(txt.trim()) { db.collection("posts").add({ text: txt, user: auth.currentUser.displayName, time: firebase.firestore.FieldValue.serverTimestamp() }); document.getElementById('pTxt').value = ""; }
        }

        function showUserList() {
            document.getElementById('nav-title').innerText = "Select Contact";
            const area = document.getElementById('content-area');
            area.innerHTML = `<div id="uList" class="space-y-2"></div>`;
            db.collection("users").get().then(snap => {
                const uList = document.getElementById('uList');
                snap.forEach(doc => {
                    if(doc.id !== auth.currentUser.uid) {
                        uList.innerHTML += `<div onclick="openChat('${doc.id}', '${doc.data().name}')" class="bg-white p-4 rounded-xl shadow cursor-pointer">👤 ${doc.data().name}</div>`;
                    }
                });
            });
        }

        function openChat(id, name) {
            document.getElementById('nav-title').innerText = name;
            const area = document.getElementById('content-area');
            area.innerHTML = `<div id="chatBox" class="h-80 overflow-y-auto mb-2 space-y-2 p-2 bg-gray-50 rounded"></div><div class="flex"><input id="cInp" class="flex-1 border p-2 rounded-l" placeholder="Message..."><button onclick="sendPrivateMsg('${id}')" class="bg-green-600 text-white px-4 rounded-r">Send</button></div>`;
            const chatId = auth.currentUser.uid < id ? auth.currentUser.uid + "_" + id : id + "_" + auth.currentUser.uid;
            db.collection("chats").doc(chatId).collection("messages").orderBy("time").onSnapshot(snap => {
                const box = document.getElementById('chatBox'); if(!box) return; box.innerHTML = "";
                snap.forEach(doc => {
                    const isMe = doc.data().sender === auth.currentUser.uid;
                    box.innerHTML += `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}"><div class="${isMe ? 'bg-blue-600 text-white' : 'bg-gray-300 text-black'} p-2 rounded-lg text-sm max-w-[80%]">${doc.data().text}</div></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendPrivateMsg(fId) {
            const txt = document.getElementById('cInp').value;
            const cId = auth.currentUser.uid < fId ? auth.currentUser.uid + "_" + fId : fId + "_" + auth.currentUser.uid;
            if(txt.trim()) { db.collection("chats").doc(cId).collection("messages").add({ text: txt, sender: auth.currentUser.uid, time: firebase.firestore.FieldValue.serverTimestamp() }); document.getElementById('cInp').value = ""; }
        }
    </script>
</body>
</html>
